categories:

  pre_check:  # 准入检查
    basic_qualification:
      - name: R0001
        type: range
        description: "年龄18-65岁"
        hint: "年龄不符合准入要求"
        violation: "年龄 {age} 不在允许范围 {lower[value]}~{upper[value]} 内"
        condition:
          field: age
          operator: "between"
          lower:
            value: 18
            inclusive: true
          upper:
            value: 65
            inclusive: true
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0001

      - name: R0002
        type: enum
        description: "职业类型"
        hint: "职业类型不符合准入要求"
        violation: "职业类型 {employment_status} 不符合枚举类型 {allowed_values}"
        condition:
          field: employment_status
          operator: "in"
          allowed_values: [ "full_time", "part_time", "self_employed", "farmer", "business_owner" ]
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0002

      - name: R0003
        type: threshold
        description: "月收入不低于3000元"
        hint: "月收入过低"
        violation: "月收入 {monthly_income} 低于最低要求 {threshold}"
        condition:
          field: monthly_income
          operator: ">="
          threshold: 3000
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0003

      - name: R0004
        type: date
        description: "入职满6个月"
        hint: "入职时长过低"
        violation: "入职日期 {employment_date} 不满足最低入职天数要求 {value} {granularity}"
        condition:
          field: employment_date
          operator: ">"
          value: 180
          granularity: day
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0004

      - name: R0005
        type: regex
        description: "身份证号格式校验"
        hint: "身份证号格式不符要求"
        violation:
        condition:
          field: id_number
          operator: "match"
          pattern: '^\d{18}$'
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0005

      - name: R0006
        type: threshold
        description: "信用评分>=650"
        hint: "信用评分过低"
        violation: "信用评分 {credit_score} 不满足最低要求 {threshold}"
        condition:
          field: monthly_income
          operator: ">="
          threshold: 650
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0006

      - name: R0007
        type: threshold
        description: "最近12个月逾期次数<=6"
        hint: "最近12个月逾期次数过多"
        violation: "最近12个月逾期次数 {n_delinquency_last_12m} 超过阈值 {threshold}"
        condition:
          field: n_delinquency_last_12m
          operator: ">"
          threshold: 6
        status: active
        stage: underwriting
        priority: 120
        stop_on_fail: true
        rejected_code: RC0007

      - name: R0008
        type: combination
        description: "年龄和收入组合判断。年龄35岁以下且月收入低于5000或年龄超过40岁月收入低于15000或年龄大于55岁的客户直接拒绝"
        hint: "年龄和收入组合不符合要求"
        violation: "最近12个月逾期次数 {n_delinquency_last_12m} 超过阈值 {threshold}"
        logic:
          operator: OR
          groups:
            - operator: AND
              conditions: [ age_lt_35, monthly_income_lt_5000 ]
            - operator: AND
              conditions: [ age_gt_40, monthly_income_lt_15000 ]
            - conditions: [ age_gt_55 ]
        conditions:
          age_lt_35:
            field: age
            operator: "<"
            value: 35

          monthly_income_lt_5000:
            field: monthly_income
            operator: "<"
            value: 5000

          age_gt_40:
            field: age
            operator: ">"
            value: 40

          monthly_income_lt_15000:
            field: monthly_income
            operator: "<"
            value: 15000

          age_gt_55:
            field: age
            operator: ">"
            value: 55
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0008

      - name: R0009
        type: range
        description: "贷款期限在12-60个月"
        hint: "贷款期限不符合准入要求"
        violation: "贷款期限 {loan_term_months} 不在允许范围 {lower[value]}~{upper[value]} 内"
        condition:
          field: loan_term_months
          operator: "between"
          lower:
            value: 12
            inclusive: true
          upper:
            value: 60
            inclusive: true
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0009

    employment_check:
      - name: R0010
        type: external
        description: "申请人必须在员工名单中"
        hint: "申请人不在白名单内"
        violation: "申请人 {employee_id} 不在白名单内"
        conditions:
          func: check_internal_employee_api
          args: employee_id
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0010

      - name: R0011
        type: combination
        description: "种植面积>=100或年产值>=50000"
        hint: "种植面积或年产值不满足要求"
        violation: "种植面积{crop_area}或年产值{annual_farm_output}不满足要求"
        logic:
          operator: OR
          groups:
            - conditions: [ crop_area_lt_100]
            - conditions: [ annual_farm_output_lt_5000 ]
        conditions:
          crop_area_lt_100:
            field: crop_area
            operator: "<"
            value: 35

          annual_farm_output_lt_5000:
            field: annual_farm_output
            operator: "<"
            value: 5000

        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0011

      - name: R0012
        type: threshold
        description: "年营业额最低要求200000"
        hint: "年营业额不满足要求"
        violation: "年营业额超过阈值 {threshold}"
        condition:
          field: annual_turnover
          operator: ">"
          threshold: 200000
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0012

      - name: R0013
        type: enum
        description: "如果贷款用途为赌博、股票、理财、基金，则拒绝"
        hint: "贷款用途不符合准入要求"
        violation: "贷款用途 {loan_purpose} 命中不允许枚举类型 {allowed_values}"
        condition:
          field: employment_status
          operator: "not in"
          allowed_values: ["gambling","stock", "financial_management","fund"]
        status: active
        stage: underwriting
        priority: 120
        stop_on_fail: true
        rejected_code: RC0013

  blacklist:  # 黑名单检查
    internal_blacklist:
      - name: R0014
        type: external
        description: "内部黑名单"
        hint: "申请人命中内部黑名单"
        violation: "申请人 {employee_id} 命中内部黑名单"
        conditions:
          func: check_internal_blacklist_api
          args: employee_id
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0014

    external_blacklist:
      - name: R0015
        type: external
        description: "外部黑名单"
        hint: "申请人命中外部黑名单"
        violation: "申请人 {employee_id} 命中外部黑名单"
        conditions:
          func: check_external_blacklist_api
          args:
            employee_id
            phone_number
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0015

    sanctions_check:
      - name: R0016
        type: external
        description: "受制裁名单检查"
        hint: "申请人命中受制裁名单"
        violation: "申请人 {id_number} 命中受制裁名单"
        conditions:
          func: check_sanctions_list_api
          args:
            full_name
            phone_number
            id_number
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0016

  credit:  # 征信检查
    credit_score:
      - name: R0017
        type: threshold
        description: "信用分>=600"
        hint: "信用分过低"
        violation: "信用分 {credit_score} 低于最低要求 {threshold}"
        condition:
          field: credit_score
          operator: ">="
          threshold: 600
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0017

      - name: R0018
        type: threshold
        description: "最近12个月逾期次数<=6"
        hint: "最近12个月逾期次数过多"
        violation: "最近12个月逾期次数 {n_delinquency_last_12m} 超过阈值 {threshold}"
        condition:
          field: n_delinquency_last_12m
          operator: ">"
          threshold: 6
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0018

  third_party:  # 三方数据
    tax:
      - name: R0019
        type: external
        description: "最近12个月税务记录正常"
        hint: "最近12个月税务记录非正常"
        violation: "申请人 {id_number} 最近12个月税务记录非正常"
        conditions:
          func: check_tax_record_api
          args:
            id_number
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0019

    judicial:
      - name: R0020
        type: external
        description: "司法记录正常"
        hint: "司法记录非正常"
        violation: "申请人 {id_number} 司法记录非正常"
        conditions:
          func: check_judicial_record_api
          args:
            id_number
            full_name
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0020

    social_fund:
      - name: R0021
        type: external
        description: "公积金缴纳正常"
        hint: "月公积金缴纳非正常"
        violation: "申请人 {id_number} 公积金缴纳非正常"
        conditions:
          func: check_housing_fund_api
          args:
            id_number
            full_name
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0021

    industry_data:
      - name: R0022
        type: external
        description: "工商经营信息正常"
        hint: "工商经营信息非正常"
        violation: "申请人 {id_number} 工商经营信息非正常"
        conditions:
          func: check_business_registration_api
          args:
            id_number
            business_name
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0022

  custom_rules:  # 自定义复杂规则
    risk_control:
      - name: R0023
        type: external
        description: "企业经营风险分析"
        hint: "企业经营风险分析有风险"
        violation: "申请人 {id_number} 企业经营风险分析有风险"
        conditions:
          func: check_business_risk_api
          args:
            id_number
            industry_code
        status: active
        stage: underwriting
        priority: 10
        stop_on_fail: true
        rejected_code: RC0023
