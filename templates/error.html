<!-- Datamind/templates/error.html -->
{% extends "base.html" %}

{% block title %}错误 - Datamind{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto text-center py-5">
        <div class="display-1 text-danger mb-4">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 class="mb-3">系统发生错误</h2>
        <div class="alert alert-danger">
            {{ error }}
        </div>
        <p class="text-muted small mb-4">请求ID: {{ request_id }}</p>
        <a href="/ui" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>返回首页
        </a>
    </div>
</div>
{% endblock %}
