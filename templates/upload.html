<!-- templates/upload.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Datamind 模型注册</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .preview { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Datamind 模型注册</h1>

        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>模型文件 (*.pkl, *.joblib, *.onnx)</label>
                <input type="file" name="model_file" accept=".pkl,.joblib,.onnx,.model" required>
            </div>

            <div class="form-group">
                <label>模型ID</label>
                <input type="text" name="model_id" placeholder="例如: credit_score_v1" required>
            </div>

            <div class="form-group">
                <label>任务类型</label>
                <select name="task_type" required>
                    <option value="scoring">评分卡 (scoring)</option>
                    <option value="fraud_detection">反欺诈 (fraud_detection)</option>
                </select>
            </div>

            <div class="form-group">
                <label>模型类型</label>
                <select name="model_type" required>
                    <option value="logistic_regression">逻辑回归 (logistic_regression)</option>
                    <option value="xgboost">XGBoost</option>
                    <option value="lightgbm">LightGBM</option>
                    <option value="random_forest">随机森林 (random_forest)</option>
                    <option value="decision_tree">决策树 (decision_tree)</option>
                </select>
            </div>

            <div class="form-group">
                <label>框架</label>
                <select name="framework" required>
                    <option value="sklearn">Scikit-learn</option>
                    <option value="xgboost">XGBoost</option>
                    <option value="lightgbm">LightGBM</option>
                    <option value="torch">PyTorch</option>
                    <option value="tensorflow">TensorFlow</option>
                    <option value="onnx">ONNX</option>
                    <option value="catboost">CatBoost</option>
                </select>
            </div>

            <div class="form-group">
                <label>版本号</label>
                <input type="text" name="version" placeholder="例如: 1.0.0" required>
            </div>

            <div class="form-group">
                <label>特征名称列表 (JSON数组)</label>
                <textarea name="feature_names" rows="3" required>["age", "income", "education", "employment_years"]</textarea>
            </div>

            <div class="form-group">
                <label>描述 (可选)</label>
                <textarea name="description" rows="2"></textarea>
            </div>

            <div class="form-group">
                <label>标签 (可选, JSON对象)</label>
                <textarea name="tags" rows="2">{"author": "张三", "department": "风控"}</textarea>
            </div>

            <button type="submit">注册模型</button>
        </form>

        <div id="preview" class="preview" style="display:none">
            <h3>注册信息预览</h3>
            <pre id="preview-content"></pre>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/v1/models/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert('模型注册成功！');
                    console.log('注册结果:', result);

                    // 显示预览
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('preview-content').textContent =
                        JSON.stringify(result.data, null, 2);
                } else {
                    alert('注册失败: ' + result.detail);
                }
            } catch (error) {
                alert('注册失败: ' + error.message);
            }
        };
    </script>
</body>
</html>
