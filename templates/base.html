<!-- datamind/templates/base.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Datamind 模型管理平台{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 自定义CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/ui">
                <i class="fas fa-brain me-2"></i>Datamind
                <span class="badge bg-light text-primary ms-2">{{ env }}</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path == '/ui' %}active{% endif %}" href="/ui">
                            <i class="fas fa-home me-1"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/ui/models' in request.url.path %}active{% endif %}" href="/ui/models">
                            <i class="fas fa-cubes me-1"></i>模型管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/ui/deployments' in request.url.path %}active{% endif %}" href="/ui/deployments">
                            <i class="fas fa-rocket me-1"></i>部署管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/ui/audit' in request.url.path %}active{% endif %}" href="/ui/audit">
                            <i class="fas fa-history me-1"></i>审计日志
                        </a>
                    </li>
                </ul>
                <div class="d-flex">
                    <span class="navbar-text me-3">
                        <i class="fas fa-user me-1"></i>{{ current_user }}
                    </span>
                    <a href="/api/docs" class="btn btn-outline-light btn-sm me-2" target="_blank">
                        <i class="fas fa-code"></i> API文档
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">
                <i class="fas fa-copyright me-1"></i> 2024 Datamind 模型部署平台 v{{ version }}
                <span class="mx-2">|</span>
                <i class="fas fa-database me-1"></i> 数据库: PostgreSQL
                <span class="mx-2">|</span>
                <i class="fas fa-tachometer-alt me-1"></i> 请求ID: <code>{{ request_id }}</code>
            </span>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 自定义JS -->
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
