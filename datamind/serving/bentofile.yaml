# datamind/serving/bentofile.yaml

service: "scoring_service:ScoringService"

labels:
  owner: "datamind"
  project: "loan_model_platform"
  version: "1.0.0"

include:
  - "*.py"
  - "../core/**/*.py"
  - "../config/**/*.py"
  - "../../requirements.txt"

exclude:
  - "__pycache__"
  - "*.pyc"
  - "*.log"
  - "*.db"
  - "tests/**/*"
  - "migrations/**/*"

python:
  requirements_txt: "../../requirements.txt"
  packages:
    - "bentoml>=1.4.0"
    - "scikit-learn>=1.0.0"
    - "xgboost>=1.5.0"
    - "lightgbm>=3.3.0"
    - "torch>=1.10.0"
    - "tensorflow>=2.8.0"
    - "onnxruntime>=1.10.0"
    - "catboost>=1.0.0"
    - "numpy>=1.21.0"
    - "pandas>=1.3.0"
    - "sqlalchemy>=1.4.0"
    - "psycopg2-binary>=2.9.0"
    - "redis>=4.0.0"
    - "pydantic>=2.0.0"
    - "pydantic-settings>=2.0.0"
    - "python-dotenv>=1.0.0"
    - "alembic>=1.8.0"
    - "pyyaml>=6.0"

docker:
  distro: debian
  python_version: "3.10"
  system_packages:
    - "libpq-dev"
    - "gcc"
    - "g++"
    - "make"
    - "curl"
    - "git"
  environment:
    - ENVIRONMENT=production
    - PYTHONUNBUFFERED=1
    - TZ=UTC