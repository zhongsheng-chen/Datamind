services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: datamind-db
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 30s
      retries: 10
    volumes:
      - ./db:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    networks:
      - datamind-network

  datamind:
    image: ${DATAMIND_IMAGE}
    container_name: datamind-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DATAMIND_PORT}:3000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATAMIND_CONFIG_PATH=${DATAMIND_CONFIG_PATH}
      - DATAMIND_LOG_NAME=${DATAMIND_LOG_NAME}
      - DATAMIND_LOG_FILE=${DATAMIND_LOG_FILE}
      - DATAMIND_LOG_LEVEL=${DATAMIND_LOG_LEVEL}
      - TZ=${TZ}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./config:/app/config
    networks:
      - datamind-network

volumes:
  postgres_data:
  postgres_logs:

networks:
  datamind-network:
    driver: bridge
