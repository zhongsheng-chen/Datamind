# config/logging.yaml
logging:
  # 基本配置
  name: "Datamind"
  level: "INFO"
  encoding: "utf-8"
  console_output: true

  # 调试配置
  formatter_debug: true
  manager_debug: true
  handler_debug: true
  filter_debug: true
  context_debug: true
  cleanup_debug: true

  # 时间格式配置
  timezone: "CST"  # 使用中国标准时间
  timestamp_precision: "milliseconds"

  # 文本日志时间格式
  text_date_format: "%Y-%m-%d"
  text_datetime_format: "%Y-%m-%d %H:%M:%S.%f"

  # JSON日志时间格式
  json_timestamp_field: "@timestamp"
  json_date_format: "yyyy-MM-dd"
  json_datetime_format: "yyyy-MM-dd'T'HH:mm:ss.SSSZ"
  json_use_epoch: false
  json_epoch_unit: "milliseconds"

  # 文件轮转时间
  rotation_at_time: "23:59"
  rotation_utc: false

  # 日志文件名时间格式
  file_name_timestamp: true
  file_name_date_format: "%Y%m%d"
  file_name_datetime_format: "%Y%m%d_%H%M%S"

  # 清理配置
  retention_days: 90
  cleanup_at_time: "03:00"

  # 时间偏移
  time_offset_hours: 0

  # 文件配置
  file: "logs/Datamind.log"
  error_file: "logs/Datamind.error.log"

  # 日志格式
  format: "json"
  text_format: "%(asctime)s - %(name)s - %(levelname)s - [%(request_id)s] - %(filename)s:%(lineno)d - %(message)s"

  # 文件轮转
  max_bytes: 104857600
  backup_count: 30
  rotation_when: "MIDNIGHT"
  rotation_interval: 1

  # 并发处理
  use_concurrent: true
  concurrent_lock_dir: "/tmp/datamind-logs"

  # 日志分类
  enable_access_log: true
  access_log_file: "logs/access.log"

  enable_audit_log: true
  audit_log_file: "logs/audit.log"

  enable_performance_log: true
  performance_log_file: "logs/performance.log"

  # 归档配置
  archive_enabled: true
  archive_path: "/data/logs/archive"
  archive_compression: "gz"
  archive_name_format: "%Y%m%d_%H%M%S"