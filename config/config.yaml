workflows:
  demo_loan_approval_workflow:
    business_name: demo_loan
    description: "零售信贷业务授信审批流程"
    models:
    - model_name: demo_loan_scorecard_lr_20250930
      ab_test:
        group: "A"
        weight: 0.6
        environment: "prod"   #dev/staging/prod
    - model_name: demo_loan_scorecard_dt_20250930
      ab_test:
        group: "B"
        weight: 0.4
        environment: "prod"
    - model_name: demo_loan_fraud_detection_cat_20250930
      ab_test: {}
    workflow_steps:
    - step_name: "rule_check"
      description: "规则检查"
      enabled: false
      contain_name: kie_container_name
      modules:
      - name: "Basic Eligibility"
        description: "基本准入要求"
        enabled: true
        rules:
        - name: "Age Not Eligible"
          description: "年龄需满足18岁以上，65岁以下"
          hint: "年龄不符合要求"
          agenda_group: "basic_eligibility"
          enabled: true
        - name: "Age + Credit Term Exceeds Limit"
          description: "年龄+授信期限不超过65岁数"
          hint: "年龄+授信期限不符合要求"
          agenda_group: "basic_eligibility"
          enabled: false
        - name: "Suspected Illegal Activity"
          description: "借款人涉嫌黄赌毒"
          hint: "借款人涉嫌黄赌毒"
          agenda_group: "basic_eligibility"
          enabled: true
        - name: "Not In Whitelist"
          description: "申请人不在白名单"
          hint: "申请人不在白名单"
          agenda_group: "basic_eligibility"
          enabled: true
        - name: "Not a Farmer"
          description: "借款人不是农户"
          hint: "借款人不是农户"
          agenda_group: "basic_eligibility"
          enabled: true
      - name: "Policy Check"
        description: "产品政策检查"
        enabled: true
        rules:
        - name: "Business Duration"
          description: "经营期限过短"
          hint: "正常经营期限<6个月"
          agenda_group: "policy_check"
          enabled: true
        - name: "Crop Duration"
          description: "种植期限过短"
          hint: "种植烟草期限不足1年"
          agenda_group: "policy_check"
          enabled: false
        - name: "Purpose Consistency"
          description: "借款人申请用途与实际用途不一致"
          hint: "借款人申请用途与实际用途不一致"
          agenda_group: "policy_check"
          enabled: true
      - name: "Credit Check"
        description: "征信要求"
        enabled: true
        rules:
        - name: "last_3m_self_queries"
          description: "近三个月本人查询次数"
          hint: "近三个月本人查询次数超出范围"
          agenda_group: "basic_qualification"
          enabled: true
        - name: "last_3m_agency_queries"
          description: "近三个月机构查询次数"
          hint: "近三个月机构查询次数超出范围"
          agenda_group: "basic_qualification"
          enabled: false
      - name: "Internal Check"
        description: "内部信息检查"
        enabled: false
        rules:
        - name: "Current Overdue"
          description: "当前有逾期"
          hint: "当前有逾期"
          agenda_group: "internal_check"
          enabled: true
        - name: "Past 24-Month Loan Overdue"
          description: "近24个月历史贷款有逾期"
          hint: "近24个月历史贷款有逾期"
          agenda_group: "internal_check"
          enabled: true
    - step_name: "fraud_check"
      description: "欺诈检查"
      enabled: false
      models: ["demo_loan_fraud_detection_cat_20250930"]
    - step_name: "model_scoring"
      description: "模型评分"
      enabled: true
      models: ["demo_loan_scorecard_lr_20250930", "demo_loan_scorecard_dt_20250930"]

  demo_loan_disbursement_workflow:
    business_name: demo_loan
    description: "零售信贷业务贷款支用流程"
    models:
    - model_name: demo_loan_scorecard_lr_20250930
      ab_test:
        group: "A"
        weight: 0.6
        environment: "prod"   #dev/staging/prod
    - model_name: demo_loan_scorecard_dt_20250930
      ab_test:
        group: "B"
        weight: 0.4
        environment: "prod"
    - model_name: demo_loan_fraud_detection_cat_20250930
      ab_test: {}
    workflow_steps:
    - step_name: "rule_check"
      contain_name: kie_container_name
      modules:
      - name: "Policy Check"
        description: "政策信息检查"
        enabled: true
        rules:
        - name: "Whitelist Check"
          description: "白名单检查"
          hint: "借款人不属于白名单内客户"
          agenda_group: "policy_check"
          enabled: true
      - name: "Business Check"
        description: "产品政策检查"
        enabled: true
        rules:
        - name: "Registration Status"
          description: "工商登记状态异常"
          hint: "工商登记状态异常"
          agenda_group: "business_check"
          enabled: true
        - name: "License Expiry"
          description: "营业执照过期"
          hint: "营业执照过期"
          agenda_group: "business_check"
          enabled: true
      - name: "Internal Check"
        description: "内部信息检查"
        enabled: false
        rules:
        - name: "Current Overdue"
          description: "当前有逾期"
          hint: "当前有逾期"
          agenda_group: "internal_check"
          enabled: true
        - name: "Past 24-Month Loan Overdue"
          description: "近24个月历史贷款有逾期且申请时点至支用时点新增的逾期"
          hint: "行内还款记录显示，近12个月内最高逾期＞=3，（还款方式为不规则还款时，最高逾期＞=2）"
          agenda_group: "internal_check"
          enabled: true
    - step_name: "fraud_check"
      models: ["demo_loan_fraud_detection_cat"]
